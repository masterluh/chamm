    <script src="main.js"></script>
    <script>
      function createHeart() {
        const heart = document.createElement("div");
        heart.classList.add("heart");
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.animationDuration = Math.random() * 3 + 4 + "s";
        heart.style.width = heart.style.height = Math.random() * 10 + 10 + "px";
        document.querySelector(".hearts").appendChild(heart);
        setTimeout(() => heart.remove(), 6000);
      }

      setInterval(createHeart, 300);
    </script>
    <script>
      const imageSources = [
        "img/cham1.jpg",
        "img/cham2.jpg",
        "img/cham3.jpg",
        "img/cham4.jpg",
      ];

      function createFloatingImage() {
        const img = document.createElement("img");
        img.classList.add("float-img");

        img.src = imageSources[Math.floor(Math.random() * imageSources.length)];
        img.style.left = Math.random() * 100 + "vw";

        const size = Math.random() * 80 + 60;
        img.style.width = size + "px";
        img.style.height = size + "px";

        document.querySelector(".floating-images").appendChild(img);
        setTimeout(() => img.remove(), 6000);
      }

      setInterval(createFloatingImage, 500);
    </script>
    <script>
      const floatingTexts = [
        "Tuyết Châm xinh iu ♥️",
        "Tuyết Châm dễ thương ❄️",
        "Tuyết Châm đáng yêu 🩵",
      ];

      function createFloatingText() {
        const text = document.createElement("div");
        text.classList.add("float-text");

        text.innerText =
          floatingTexts[Math.floor(Math.random() * floatingTexts.length)];

        text.style.left = Math.random() * 100 + "vw";

        // thời gian bay ngẫu nhiên (4–7s)
        text.style.animationDuration = Math.random() * 3 + 4 + "s";

        document.querySelector(".floating-texts").appendChild(text);
        setTimeout(() => text.remove(), 6000);
      }

      // tạo chữ liên tục
      setInterval(createFloatingText, 800);
    </script>
